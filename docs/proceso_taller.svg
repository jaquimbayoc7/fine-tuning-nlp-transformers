<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" style="font-family: 'Segoe UI', Arial, sans-serif;">
  <defs>
    <linearGradient id="localGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#50C878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3DA35D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hfGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC7A00;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Título -->
  <text x="600" y="40" font-size="32" font-weight="bold" text-anchor="middle" fill="#2C3E50">
    Estrategia Híbrida: Fine-tuning NER y Clasificación
  </text>
  <text x="600" y="70" font-size="16" text-anchor="middle" fill="#7F8C8D">
    Local (CPU) + Cloud (Kaggle GPU T4) + HuggingFace Hub
  </text>

  <!-- Área Local -->
  <rect x="50" y="100" width="350" height="620" rx="10" fill="url(#localGradient)" opacity="0.1" stroke="#4A90E2" stroke-width="2"/>
  <text x="225" y="130" font-size="20" font-weight="bold" text-anchor="middle" fill="#2C3E50">
    🖥️ LOCAL (VS Code + CPU)
  </text>

  <!-- Fase 1: EDA Local -->
  <g filter="url(#shadow)">
    <rect x="80" y="160" width="290" height="140" rx="8" fill="white" stroke="#4A90E2" stroke-width="2"/>
    <text x="225" y="185" font-size="16" font-weight="bold" text-anchor="middle" fill="#2C3E50">
      📊 Fase 1: Exploración de Datos
    </text>
    <text x="90" y="210" font-size="13" fill="#555">
      <tspan x="90" dy="0">✓ EDA TASS (notebook 1)</tspan>
      <tspan x="90" dy="22">✓ EDA Sarcasmo (notebook 3)</tspan>
      <tspan x="90" dy="22">✓ EDA CoNLL-2002 (notebook 6)</tspan>
      <tspan x="90" dy="22">✓ EDA Próstata (notebook 9)</tspan>
      <tspan x="90" dy="22" font-weight="600" fill="#4A90E2">→ Visualizaciones + Estadísticas</tspan>
    </text>
  </g>

  <!-- Área Kaggle -->
  <rect x="450" y="100" width="700" height="380" rx="10" fill="url(#cloudGradient)" opacity="0.1" stroke="#50C878" stroke-width="2"/>
  <text x="800" y="130" font-size="20" font-weight="bold" text-anchor="middle" fill="#2C3E50">
    ☁️ KAGGLE (GPU T4 x2)
  </text>

  <!-- Fase 2: Entrenamiento Clasificación -->
  <g filter="url(#shadow)">
    <rect x="480" y="160" width="320" height="150" rx="8" fill="white" stroke="#50C878" stroke-width="2"/>
    <text x="640" y="185" font-size="16" font-weight="bold" text-anchor="middle" fill="#2C3E50">
      🎯 Fase 2: Clasificación
    </text>
    <text x="490" y="210" font-size="13" fill="#555">
      <tspan x="490" dy="0">✓ TASS - BETO: F1 64.54% (nb 2)</tspan>
      <tspan x="490" dy="22">✓ TASS - XLM-R: F1 64.41%</tspan>
      <tspan x="490" dy="22">✓ Sarcasmo - BETO: F1 99.56% (nb 4)</tspan>
      <tspan x="490" dy="22">✓ Sarcasmo - XLM-R: F1 93.91%</tspan>
      <tspan x="490" dy="22" font-weight="600" fill="#50C878">→ 4 modelos publicados</tspan>
    </text>
  </g>

  <!-- Fase 3: Entrenamiento NER -->
  <g filter="url(#shadow)">
    <rect x="820" y="160" width="310" height="150" rx="8" fill="white" stroke="#50C878" stroke-width="2"/>
    <text x="975" y="185" font-size="16" font-weight="bold" text-anchor="middle" fill="#2C3E50">
      🏷️ Fase 3: NER
    </text>
    <text x="830" y="210" font-size="13" fill="#555">
      <tspan x="830" dy="0">✓ BiLSTM CoNLL: F1 72.00% (nb 7, 8)</tspan>
      <tspan x="830" dy="22">✓ Próstata - BETO: F1 96.18% (nb 10)</tspan>
      <tspan x="830" dy="22">✓ Próstata - XLM-R: F1 96.70% (nb 11)</tspan>
      <tspan x="830" dy="22" font-weight="600" fill="#50C878">→ +24.70 pts vs BiLSTM</tspan>
      <tspan x="830" dy="22" font-weight="600" fill="#50C878">→ 2 modelos publicados</tspan>
    </text>
  </g>

  <!-- Fase 4: HuggingFace -->
  <g filter="url(#shadow)">
    <rect x="480" y="330" width="650" height="130" rx="8" fill="white" stroke="#FF9900" stroke-width="2"/>
    <text x="805" y="355" font-size="16" font-weight="bold" text-anchor="middle" fill="#2C3E50">
      🤗 Fase 4: Publicación en HuggingFace Hub
    </text>
    <text x="490" y="380" font-size="13" fill="#555">
      <tspan x="490" dy="0">✓ Lucyan85/beto-tass-sentiment | Lucyan85/xlmr-tass-sentiment</tspan>
      <tspan x="490" dy="22">✓ Lucyan85/beto-sarcasmo-sentiment | Lucyan85/xlmr-sarcasmo-sentiment</tspan>
      <tspan x="490" dy="22">✓ Lucyan85/beto-ner-prostata | Lucyan85/xlmr-ner-prostata</tspan>
      <tspan x="490" dy="22" font-weight="600" fill="#FF9900">→ 6 modelos disponibles públicamente (Transformers 4.30.0 + PyTorch 2.0.1)</tspan>
    </text>
  </g>

  <!-- Fase 5: Pruebas Local -->
  <g filter="url(#shadow)">
    <rect x="80" y="320" width="290" height="130" rx="8" fill="white" stroke="#4A90E2" stroke-width="2"/>
    <text x="225" y="345" font-size="16" font-weight="bold" text-anchor="middle" fill="#2C3E50">
      🧪 Fase 5: Pruebas de Modelos
    </text>
    <text x="90" y="370" font-size="13" fill="#555">
      <tspan x="90" dy="0">✓ Test modelos Sarcasmo (nb 7)</tspan>
      <tspan x="90" dy="22">✓ Test todos los modelos (nb 8)</tspan>
      <tspan x="90" dy="22">✓ Inferencia con pipeline</tspan>
      <tspan x="90" dy="22" font-weight="600" fill="#4A90E2">→ Validación en CPU</tspan>
    </text>
  </g>

  <!-- Fase 6: Análisis Local -->
  <g filter="url(#shadow)">
    <rect x="80" y="470" width="290" height="130" rx="8" fill="white" stroke="#4A90E2" stroke-width="2"/>
    <text x="225" y="495" font-size="16" font-weight="bold" text-anchor="middle" fill="#2C3E50">
      📈 Fase 6: Análisis Comparativo
    </text>
    <text x="90" y="520" font-size="13" fill="#555">
      <tspan x="90" dy="0">✓ Comparación TASS vs Sarcasmo</tspan>
      <tspan x="90" dy="22">✓ BETO vs XLM-RoBERTa</tspan>
      <tspan x="90" dy="22">✓ BiLSTM vs Transformers</tspan>
      <tspan x="90" dy="22" font-weight="600" fill="#4A90E2">→ Insights clave + Reportes</tspan>
    </text>
  </g>

  <!-- Fase 7: Documentación -->
  <g filter="url(#shadow)">
    <rect x="80" y="620" width="290" height="80" rx="8" fill="white" stroke="#9B59B6" stroke-width="2"/>
    <text x="225" y="645" font-size="16" font-weight="bold" text-anchor="middle" fill="#2C3E50">
      📝 Fase 7: Documentación
    </text>
    <text x="90" y="670" font-size="13" fill="#555">
      <tspan x="90" dy="0">✓ README.md + ESTADO_PROYECTO.md</tspan>
      <tspan x="90" dy="20" font-weight="600" fill="#9B59B6">→ Publicación en GitHub</tspan>
    </text>
  </g>

  <!-- Resultados Finales -->
  <g filter="url(#shadow)">
    <rect x="450" y="500" width="700" height="220" rx="10" fill="#FFF5E6" stroke="#FF9900" stroke-width="3"/>
    <text x="800" y="535" font-size="20" font-weight="bold" text-anchor="middle" fill="#2C3E50">
      🏆 RESULTADOS DEL PROYECTO
    </text>
    
    <!-- Columna 1 -->
    <text x="480" y="565" font-size="14" font-weight="bold" fill="#2C3E50">Modelos Publicados:</text>
    <text x="480" y="590" font-size="12" fill="#555">
      <tspan x="480" dy="0">• 6 modelos en HuggingFace Hub</tspan>
      <tspan x="480" dy="18">• 4 clasificación + 2 NER</tspan>
      <tspan x="480" dy="18">• 100% reproducibles</tspan>
    </text>
    
    <!-- Columna 2 -->
    <text x="720" y="565" font-size="14" font-weight="bold" fill="#2C3E50">Métricas Destacadas:</text>
    <text x="720" y="590" font-size="12" fill="#555">
      <tspan x="720" dy="0">• Sarcasmo: 99.56% F1 ⭐</tspan>
      <tspan x="720" dy="18">• NER Próstata: 96.70% F1 ⭐⭐</tspan>
      <tspan x="720" dy="18">• +24.70 pts mejora Transformers</tspan>
    </text>

    <!-- Columna 3 -->
    <text x="960" y="565" font-size="14" font-weight="bold" fill="#2C3E50">Completitud:</text>
    <text x="960" y="590" font-size="12" fill="#555">
      <tspan x="960" dy="0">• 4.25/4.5 puntos (94.4%)</tspan>
      <tspan x="960" dy="18">• 11 notebooks creados</tspan>
      <tspan x="960" dy="18">• Documentación completa</tspan>
    </text>

    <!-- Tiempo y recursos -->
    <rect x="480" y="645" width="640" height="50" rx="5" fill="#E8F5E9"/>
    <text x="800" y="670" font-size="13" text-anchor="middle" fill="#2C3E50">
      ⚡ <tspan font-weight="bold">Eficiencia:</tspan> 0€ costo GPU | 30h Kaggle gratuitas | Estrategia híbrida optimizada
    </text>
  </g>

  <!-- Flechas de flujo -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#7F8C8D" />
    </marker>
  </defs>
  
  <!-- EDA Local → Entrenamiento Kaggle -->
  <path d="M 370 230 L 480 230" stroke="#7F8C8D" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="415" y="220" font-size="11" fill="#7F8C8D" font-weight="600">Datasets</text>
  
  <!-- Entrenamiento → HuggingFace -->
  <path d="M 640 310 L 640 330" stroke="#7F8C8D" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="655" y="323" font-size="11" fill="#7F8C8D" font-weight="600">Push</text>
  
  <path d="M 975 310 L 975 330" stroke="#7F8C8D" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="990" y="323" font-size="11" fill="#7F8C8D" font-weight="600">Push</text>
  
  <!-- HuggingFace → Pruebas Local -->
  <path d="M 480 385 L 370 385" stroke="#7F8C8D" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="410" y="375" font-size="11" fill="#7F8C8D" font-weight="600">Download</text>
  
  <!-- Pruebas → Análisis -->
  <path d="M 225 450 L 225 470" stroke="#7F8C8D" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Análisis → Documentación -->
  <path d="M 225 600 L 225 620" stroke="#7F8C8D" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Tecnologías usadas -->
  <text x="50" y="760" font-size="12" fill="#7F8C8D">
    <tspan font-weight="bold">Stack Tecnológico:</tspan> PyTorch 2.0.1 • Transformers 4.30.0 • Datasets • Evaluate • Seqeval • FastText • Pandas • Matplotlib • Seaborn
  </text>
</svg>
